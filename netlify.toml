[build]
  command = "npm run build"
  publish = "build"

[functions]
  directory = ".netlify/functions-internal"
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
